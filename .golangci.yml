# HyperFleet Adapter - golangci-lint configuration
# Follows HyperFleet architecture linting standards
# Aligned with: https://github.com/openshift-hyperfleet/architecture/blob/main/hyperfleet/standards/golangci.yml

version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  enable:
    # Code Quality (9 linters)
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - unconvert
    - unparam
    - goconst
    - exhaustive
    # Code Style (4 linters)
    - misspell
    - lll
    - revive
    - gocritic
    # Security (1 linter)
    - gosec

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true

    govet:
      enable-all: true

    goconst:
      min-len: 3
      min-occurrences: 3

    misspell:
      locale: US

    lll:
      line-length: 120

    revive:
      rules:
        - name: exported
          severity: warning
          disabled: true  # Can be too noisy for internal packages
        - name: unexported-return
          severity: warning
          disabled: false
        - name: var-naming
          severity: warning
          disabled: false

    unparam:
      check-exported: false

    exhaustive:
      default-signifies-exhaustive: true


  exclusions:
    generated: lax
    rules:
      # Relaxed rules for test files
      - linters:
          - gosec
          - errcheck
          - unparam
        path: _test\.go
      # pkg/utils and pkg/errors: names conflict with Go conventions but renaming
      # would break the public API surface
      - linters:
          - revive
        path: pkg/utils/
        text: "avoid meaningless package names"
      - linters:
          - revive
        path: pkg/errors/
        text: "avoid package names that conflict with"
    # Standard exclusion paths
    paths:
      - third_party(/|$)
      - builtin(/|$)
      - examples(/|$)

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
  exclusions:
    generated: lax
    paths:
      - third_party(/|$)
      - builtin(/|$)
      - examples(/|$)

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false

output:
  formats:
    text:
      path: stdout
