# HyperFleet Adapter - golangci-lint configuration
# Follows HyperFleet architecture linting standards
# Aligned with: https://github.com/openshift-hyperfleet/architecture/blob/main/hyperfleet/standards/golangci.yml

version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  enable:
    # Code Quality (9 linters)
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - unconvert
    - unparam
    - goconst
    - exhaustive
    # Code Style (4 linters)
    - misspell
    - lll
    - revive
    - gocritic
    # Security (1 linter)
    - gosec

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true

    govet:
      enable-all: true

    goconst:
      min-len: 3
      min-occurrences: 3

    misspell:
      locale: US
      ignore-rules:
        - cancelled  # British spelling is acceptable

    lll:
      line-length: 120

    revive:
      rules:
        - name: exported
          severity: warning
          disabled: true  # Can be too noisy for internal packages
        - name: unexported-return
          severity: warning
          disabled: false
        - name: var-naming
          severity: warning
          disabled: false

    unparam:
      check-exported: false

    exhaustive:
      default-signifies-exhaustive: true

    gocritic:
      disabled-checks:
        - ifElseChain
        - singleCaseSwitch
        - elseif
        - exitAfterDefer

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # Relaxed rules for test files
      - linters:
          - gosec
          - errcheck
          - unparam
          - goconst
          - lll
          - gocritic
          - exhaustive
        path: _test\.go
      # Relaxed rules for integration tests
      - linters:
          - gosec
          - errcheck
          - unparam
          - goconst
          - lll
          - gocritic
          - revive
          - exhaustive
        path: test/
      # Relaxed rules for cmd/
      - linters:
          - revive
          - lll
        path: cmd/
      # Relaxed rules for internal packages
      - linters:
          - lll
        path: internal/
      # Relaxed rules for pkg/
      - linters:
          - lll
        path: pkg/
      # G304: file inclusion via variable - acceptable for config loader
      - linters:
          - gosec
        path: internal/config_loader/
        text: 'G304'
      # G404: weak random - acceptable for jitter in retry logic
      - linters:
          - gosec
        path: internal/hyperfleet_api/client\.go
        text: 'G404'
      # Package naming: underscore packages are structural and renaming is out of scope
      # Scoped to legacy underscore packages only
      - linters:
          - revive
        path: internal/(config_loader|hyperfleet_api|maestro_client|k8s_client|transport_client)/
        text: "don't use an underscore in package name"
      # Package naming: allow existing package names (scoped to legacy packages)
      - linters:
          - revive
        path: (internal/(config_loader|hyperfleet_api|maestro_client|k8s_client|transport_client)|pkg/utils)/
        text: "avoid meaningless package names"
      - linters:
          - revive
        path: (internal/(config_loader|hyperfleet_api|maestro_client|k8s_client|transport_client)|pkg/errors)/
        text: "avoid package names that conflict with"
    # Standard exclusion paths
    paths:
      - third_party(/|$)
      - builtin(/|$)
      - examples(/|$)

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
  exclusions:
    generated: lax
    paths:
      - third_party(/|$)
      - builtin(/|$)
      - examples(/|$)

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false

output:
  formats:
    text:
      path: stdout
