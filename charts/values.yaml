# Default values for hyperfleet-adapter
# This is a YAML-formatted file.

# Global settings
global:
  # Image registry for all adapter images
  imageRegistry: quay.io/openshift-hyperfleet
  # Namespace where adapters will be deployed
  namespace: hyperfleet-system

# Environment identifier
environment: development

# Image settings (shared by all adapters)
image:
  repository: hyperfleet-adapter
  tag: "1.0.0"
  pullPolicy: IfNotPresent
  pullSecrets: []

# HyperFleet API configuration
hyperfleetApi:
  # Base URL of the HyperFleet API
  baseUrl: "http://hyperfleet-api.hyperfleet-system.svc.cluster.local:8080"
  # API version
  version: "v1"
  # Secret name containing API token (key: token)
  tokenSecretName: "hyperfleet-api-token"

# Message broker configuration (shared)
broker:
  # Broker type: pubsub, awsSqs, rabbitmq
  type: "rabbitmq"
  # Maximum concurrent event processing
  maxConcurrency: 100
  
  # Google Cloud Pub/Sub configuration
  pubsub:
    projectId: "my-gcp-project"
    subscriptionId: "hyperfleet-events"
  
  # AWS SQS configuration
  awsSqs:
    region: "us-east-1"
    queueUrl: "https://sqs.us-east-1.amazonaws.com/123456789012/hyperfleet-events"
  
  # RabbitMQ configuration
  rabbitmq:
    host: "rabbitmq.hyperfleet-system.svc.cluster.local"
    port: "5672"
    queueName: "hyperfleet-cluster-events"
    exchange: "hyperfleet-events"
    username: "hyperfleet"
    # Password is stored in secret
    passwordSecretName: "rabbitmq-credentials"
    passwordSecretKey: "password"

# Kubernetes client configuration
kubernetes:
  # QPS rate limiter for K8s API
  qps: 100.0
  # Burst rate limiter for K8s API
  burst: 200

# Observability settings
observability:
  # Log level: debug, info, warn, error
  logLevel: "info"
  # Metrics port (Prometheus)
  metricsPort: 8080
  # Health check port
  healthPort: 8081
  # Enable distributed tracing
  traceEnabled: false

# RBAC settings
rbac:
  # Create RBAC resources (ServiceAccount, Role, RoleBinding)
  create: true
  # Use ClusterRole instead of Role (for cluster-scoped operations)
  clusterRole: true

# ServiceMonitor for Prometheus Operator
serviceMonitor:
  # Enable ServiceMonitor creation
  enabled: true
  # Scrape interval
  interval: 30s
  # Scrape timeout
  scrapeTimeout: 10s

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  seccompProfile:
    type: RuntimeDefault

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Adapter definitions
adapters:
  # Validation Adapter
  validation:
    # Enable this adapter
    enabled: true
    # Number of replicas
    replicas: 2
    # Subscription name (for broker)
    subscriptionName: "validation-adapter-sub"
    # Adapter configuration file (will be mounted from ConfigMap)
    # This file should exist in configs/ directory or be provided
    configFile: "validation-adapter-config.yaml"
    # Resource limits
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    # Additional environment variables
    env: []
    # Pod annotations
    podAnnotations: {}
    # Node selector
    nodeSelector: {}
    # Tolerations
    tolerations: []
    # Affinity
    affinity: {}
    # Autoscaling
    autoscaling:
      enabled: false
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80

  # DNS Adapter
  dns:
    enabled: true
    replicas: 3
    subscriptionName: "dns-adapter-sub"
    configFile: "dns-adapter-config.yaml"
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    env: []
    podAnnotations: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}
    autoscaling:
      enabled: false
      minReplicas: 3
      maxReplicas: 15
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80

  # Placement Adapter
  placement:
    enabled: false
    replicas: 2
    subscriptionName: "placement-adapter-sub"
    configFile: "placement-adapter-config.yaml"
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    env: []
    podAnnotations: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}
    autoscaling:
      enabled: false
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80

# Adapter configurations
# These will be mounted as ConfigMaps
# Add your adapter YAML configurations here
adapterConfigs:
  # Example: validation adapter config
  # validation: |
  #   adapterName: validation-adapter
  #   filters:
  #     eventTypes:
  #       - "cluster.created"
  #       - "cluster.updated"
  #   ...
