{{- range $adapterName, $adapter := .Values.adapters }}
{{- if $adapter.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hyperfleet-adapter.fullname" $ }}-{{ $adapterName }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    {{- include "hyperfleet-adapter.adapterLabels" (merge (dict "adapterType" $adapterName) $) | nindent 4 }}
spec:
  {{- if not $adapter.autoscaling.enabled }}
  replicas: {{ $adapter.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "hyperfleet-adapter.adapterSelectorLabels" (merge (dict "adapterType" $adapterName) $) | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/environment-config: {{ include (print $.Template.BasePath "/configmap-environment.yaml") $ | sha256sum }}
        {{- with $adapter.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "hyperfleet-adapter.adapterSelectorLabels" (merge (dict "adapterType" $adapterName) $) | nindent 8 }}
    spec:
      {{- with $.Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "hyperfleet-adapter.serviceAccountName" (merge (dict "adapterType" $adapterName) $) }}
      securityContext:
        {{- toYaml $.Values.podSecurityContext | nindent 8 }}
      containers:
      - name: adapter
        image: {{ include "hyperfleet-adapter.image" $ }}
        imagePullPolicy: {{ $.Values.image.pullPolicy }}
        args:
          - --config=/etc/adapter/config/adapter-config.yaml
        securityContext:
          {{- toYaml $.Values.securityContext | nindent 10 }}
        env:
          # Environment configuration
          - name: ENVIRONMENT
            valueFrom:
              configMapKeyRef:
                name: {{ include "hyperfleet-adapter.environmentConfigMapName" $ }}
                key: ENVIRONMENT
          - name: HYPERFLEET_API_BASE_URL
            valueFrom:
              configMapKeyRef:
                name: {{ include "hyperfleet-adapter.environmentConfigMapName" $ }}
                key: HYPERFLEET_API_BASE_URL
          - name: HYPERFLEET_API_VERSION
            valueFrom:
              configMapKeyRef:
                name: {{ include "hyperfleet-adapter.environmentConfigMapName" $ }}
                key: HYPERFLEET_API_VERSION
          - name: LOG_LEVEL
            valueFrom:
              configMapKeyRef:
                name: {{ include "hyperfleet-adapter.environmentConfigMapName" $ }}
                key: LOG_LEVEL
          - name: METRICS_PORT
            valueFrom:
              configMapKeyRef:
                name: {{ include "hyperfleet-adapter.environmentConfigMapName" $ }}
                key: METRICS_PORT
          - name: HEALTH_PORT
            valueFrom:
              configMapKeyRef:
                name: {{ include "hyperfleet-adapter.environmentConfigMapName" $ }}
                key: HEALTH_PORT
          - name: TRACE_ENABLED
            valueFrom:
              configMapKeyRef:
                name: {{ include "hyperfleet-adapter.environmentConfigMapName" $ }}
                key: TRACE_ENABLED
          - name: KUBERNETES_QPS
            valueFrom:
              configMapKeyRef:
                name: {{ include "hyperfleet-adapter.environmentConfigMapName" $ }}
                key: KUBERNETES_QPS
          - name: KUBERNETES_BURST
            valueFrom:
              configMapKeyRef:
                name: {{ include "hyperfleet-adapter.environmentConfigMapName" $ }}
                key: KUBERNETES_BURST
          # HyperFleet API token
          - name: HYPERFLEET_API_TOKEN
            valueFrom:
              secretKeyRef:
                name: {{ $.Values.hyperfleetApi.tokenSecretName }}
                key: token
          # Adapter-specific subscription name
          - name: SUBSCRIPTION_NAME
            value: {{ $adapter.subscriptionName | quote }}
          # Adapter type identifier
          - name: ADAPTER_TYPE
            value: {{ $adapterName | quote }}
          # Broker configuration
          {{- include "hyperfleet-adapter.brokerEnvVars" $ | nindent 10 }}
          # Additional adapter-specific env vars
          {{- with $adapter.env }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        ports:
        - name: metrics
          containerPort: {{ $.Values.observability.metricsPort }}
          protocol: TCP
        - name: health
          containerPort: {{ $.Values.observability.healthPort }}
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          {{- toYaml $adapter.resources | nindent 10 }}
        volumeMounts:
        - name: adapter-config
          mountPath: /etc/adapter/config
          readOnly: true
      volumes:
      - name: adapter-config
        configMap:
          name: {{ include "hyperfleet-adapter.adapterConfigMapName" (merge (dict "adapterType" $adapterName) $) }}
      {{- with $adapter.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $adapter.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $adapter.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
{{- end }}
