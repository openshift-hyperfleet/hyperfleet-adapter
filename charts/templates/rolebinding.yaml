{{- if .Values.rbac.create }}
{{- range $adapterName, $adapter := .Values.adapters }}
{{- if $adapter.enabled }}
---
{{- if $.Values.rbac.clusterRole }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "hyperfleet-adapter.serviceAccountName" (merge (dict "adapterType" $adapterName) $) }}
  labels:
    {{- include "hyperfleet-adapter.adapterLabels" (merge (dict "adapterType" $adapterName) $) | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "hyperfleet-adapter.serviceAccountName" (merge (dict "adapterType" $adapterName) $) }}
subjects:
- kind: ServiceAccount
  name: {{ include "hyperfleet-adapter.serviceAccountName" (merge (dict "adapterType" $adapterName) $) }}
  namespace: {{ $.Values.global.namespace }}
{{- else }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "hyperfleet-adapter.serviceAccountName" (merge (dict "adapterType" $adapterName) $) }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    {{- include "hyperfleet-adapter.adapterLabels" (merge (dict "adapterType" $adapterName) $) | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "hyperfleet-adapter.serviceAccountName" (merge (dict "adapterType" $adapterName) $) }}
subjects:
- kind: ServiceAccount
  name: {{ include "hyperfleet-adapter.serviceAccountName" (merge (dict "adapterType" $adapterName) $) }}
  namespace: {{ $.Values.global.namespace }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}

