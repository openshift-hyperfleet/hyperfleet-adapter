{{- range $adapterName, $adapter := .Values.adapters }}
{{- if $adapter.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "hyperfleet-adapter.adapterConfigMapName" (merge (dict "adapterType" $adapterName) $) }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    {{- include "hyperfleet-adapter.adapterLabels" (merge (dict "adapterType" $adapterName) $) | nindent 4 }}
data:
  adapter-config.yaml: |-
{{- if hasKey $.Values.adapterConfigs $adapterName }}
{{ index $.Values.adapterConfigs $adapterName | nindent 4 }}
{{- else if $adapter.configFile }}
{{ $.Files.Get (printf "configs/%s" $adapter.configFile) | default (printf "# Configuration for %s adapter\n# Please provide adapter-config.yaml content\n" $adapterName) | nindent 4 }}
{{- else }}
    # Configuration for {{ $adapterName }} adapter
    # Please provide adapter-config.yaml content in values.adapterConfigs.{{ $adapterName }}
    # or create configs/{{ $adapter.configFile }} file
    adapterName: {{ $adapterName }}-adapter
    filters:
      eventTypes:
        - "cluster.created"
        - "cluster.updated"
{{- end }}
{{- end }}
{{- end }}
